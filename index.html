</head>

<body>

<div class="auth-area">

<h1>Facio Live Prototype</h1>

</p>

<video id="video" autoplay muted></video>

<div id="status">
Initializing camera...
</div>

</div>

</div>


<div id="dashboard">

<p>Send payments securely</p>

</div>

<div class="bank-card">
<h3>Account Balance</h3>
<p>View banking data</p>

</div>

</div>
