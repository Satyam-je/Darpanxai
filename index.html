<!DOCTYPE html>
<html>

<head>

<title>Facio Demo</title>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Facio Live Prototype</h1>

<p>
Presence Based Continuous Authentication
</p>

<video id="video" autoplay muted></video>

<div id="status">
Initializing camera...
</div>

<div id="tokenBox">
Token: waiting...
</div>

<div id="dashboard" style="display:none">

<h2>Facio Banking Demo</h2>

<div class="bank-grid">

<div class="bank-card">
<h3>UPI Transfer</h3>
<p>Send payments securely</p>
<button>Open</button>
</div>

<div class="bank-card">
<h3>Account Balance</h3>
<p>View banking data</p>
<button>Open</button>
</div>

<div class="bank-card">
<h3>Secure Vault</h3>
<p>Access encrypted storage</p>
<button>Open</button>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
